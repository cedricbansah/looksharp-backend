[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "echo \"PORT=$PORT\" && python manage.py migrate --noinput 2>&1 && echo \"Starting gunicorn\" && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-file - --access-logfile - 2>&1; echo \"Gunicorn exited with code $?\""
healthcheckPath = "/api/v1/health/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
