openapi: 3.0.3
info:
  title: LookSharp Backend API
  version: 1.0.0
  description: Django REST API for LookSharp mobile and admin clients.
paths:
  /api/v1/admin/clients/:
    get:
      operationId: v1_admin_clients_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - v1
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedClientList'
          description: ''
    post:
      operationId: v1_admin_clients_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClientCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClientCreate'
        required: true
      security:
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientCreate'
          description: ''
  /api/v1/admin/clients/{client_id}/:
    patch:
      operationId: v1_admin_clients_partial_update
      description: Update an existing client.
      parameters:
      - in: path
        name: client_id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedClientUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedClientUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedClientUpdate'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
    delete:
      operationId: v1_admin_clients_destroy
      description: Delete a client if it is not referenced by surveys or offers.
      parameters:
      - in: path
        name: client_id
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - BearerAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '409':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
