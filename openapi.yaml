components:
  schemas:
    AdminClientLogoUploadRequest:
      type: object
      properties:
        file:
          type: string
          format: uri
      required:
      - file
    AdminOfferCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        status:
          $ref: '#/components/schemas/OfferStatusEnum'
        category:
          type: string
          maxLength: 100
        url:
          type: string
          format: uri
          maxLength: 500
        poster_url:
          type: string
          format: uri
          maxLength: 500
        client_id:
          type: string
          nullable: true
        offer_code:
          type: string
          readOnly: true
        end_date:
          type: string
          format: date-time
          nullable: true
        is_featured:
          type: boolean
      required:
      - offer_code
      - title
    AdminOfferPosterUploadRequest:
      type: object
      properties:
        file:
          type: string
          format: uri
      required:
      - file
    AdminQuestionCreate:
      type: object
      properties:
        question_text:
          type: string
          maxLength: 500
        question_subtext:
          type: string
          maxLength: 200
        question_type:
          $ref: '#/components/schemas/QuestionTypeEnum'
        choices: {}
        scale_lower_limit:
          type: integer
          nullable: true
        scale_upper_limit:
          type: integer
          nullable: true
      required:
      - question_text
    AdminSurveyCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
        status:
          $ref: '#/components/schemas/SurveyStatusEnum'
        category:
          type: string
          maxLength: 100
        client_id:
          type: string
          nullable: true
        points:
          type: integer
        estimated_time:
          type: integer
          nullable: true
        end_date:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: string
          maxLength: 128
    AdminUser:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        phone:
          type: string
          readOnly: true
        is_verified:
          type: boolean
          readOnly: true
        is_admin:
          type: boolean
          readOnly: true
        points:
          type: integer
          readOnly: true
        recipient_code:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - first_name
      - id
      - is_admin
      - is_verified
      - last_name
      - phone
      - points
      - recipient_code
      - updated_at
    AdminWithdrawalUpdateStatusEnum:
      enum:
      - failed
      - completed
      type: string
      description: |-
        * `failed` - failed
        * `completed` - completed
    Answer:
      type: object
      properties:
        question_id:
          type: string
        question_text:
          type: string
          default: ''
        position_index:
          type: integer
          default: 0
        answer_text:
          type: string
          default: ''
      required:
      - question_id
    Client:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        phone:
          type: string
          readOnly: true
        address:
          type: string
          readOnly: true
        website_url:
          type: string
          format: uri
          readOnly: true
        description:
          type: string
          readOnly: true
        client_code:
          type: string
          readOnly: true
          nullable: true
        logo_url:
          type: string
          format: uri
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - address
      - client_code
      - created_at
      - description
      - email
      - id
      - logo_url
      - name
      - phone
      - updated_at
      - website_url
    ClientCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          maxLength: 32
        address:
          type: string
          maxLength: 500
        website_url:
          type: string
          format: uri
          maxLength: 500
        description:
          type: string
        client_code:
          type: string
          nullable: true
          maxLength: 64
        logo_url:
          type: string
          format: uri
          maxLength: 500
      required:
      - name
    ConfigEnumsResponse:
      type: object
      properties:
