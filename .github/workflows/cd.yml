name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Optional existing image tag (example: sha-abc123def456)
        required: false
        type: string

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    name: Build and publish image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: vars
        run: |
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.sha_tag }}
            type=raw,value=main,enable=${{ github.event_name == 'push' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Export primary image reference
        id: image
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_tag }}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    environment: staging

    steps:
      - name: Resolve image for deploy
        id: deploy-image
        run: |
          IMAGE="${{ needs.build-and-publish.outputs.image }}"
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Trigger staging deploy webhook
        env:
          DEPLOY_WEBHOOK: ${{ secrets.STAGING_DEPLOY_WEBHOOK_URL }}
          IMAGE: ${{ steps.deploy-image.outputs.image }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK" ]; then
            echo "STAGING_DEPLOY_WEBHOOK_URL is not configured. Skipping deploy trigger."
            exit 0
          fi

          curl -fsSL -X POST "$DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"$IMAGE\",\"sha\":\"${GITHUB_SHA}\"}"
          echo "Staging deploy triggered for $IMAGE"

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production'
    environment: production

    steps:
      - name: Resolve image for deploy
        id: deploy-image
        run: |
          IMAGE="${{ needs.build-and-publish.outputs.image }}"
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Trigger production deploy webhook
        env:
          DEPLOY_WEBHOOK: ${{ secrets.PRODUCTION_DEPLOY_WEBHOOK_URL }}
          IMAGE: ${{ steps.deploy-image.outputs.image }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK" ]; then
            echo "PRODUCTION_DEPLOY_WEBHOOK_URL is not configured. Skipping deploy trigger."
            exit 0
          fi

          curl -fsSL -X POST "$DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"$IMAGE\",\"sha\":\"${GITHUB_SHA}\"}"
          echo "Production deploy triggered for $IMAGE"
